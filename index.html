<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Colonial Hansard Search</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
  .selected-chip {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.35rem 0.65rem;
    border: 1px solid #6c757d;
    border-radius: 999px;
    background: #e9ecef;
    font-size: 0.95rem;
  }

  .selected-chip button {
    border: 0;
    background: transparent;
    padding: 0;
    line-height: 1;
    font-size: 1rem;
    cursor: pointer;
  }
</style>

</head>

<body>

<nav class="bg-dark border-bottom py-2">
  <div class="container d-flex align-items-center">

    <!-- Left: Title -->
    <span class="text-white fw-bold fs-3 lh-1">
      Australian Colonial Hansards
    </span>

    <!-- Right: Nav -->
    <ul class="nav nav-pills ms-auto gap-2">
      <li class="nav-item">
        <a class="nav-link active bg-secondary text-white" href="index.html">Search</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-light" href="browse.html">Browse</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-light" href="help.html">Help</a>
      </li>
      <li class="nav-item">
        <a class="nav-link text-light" href="about.html">About</a>
      </li>
    </ul>

  </div>
</nav>

<div class="container py-3">

  <form>
    <div class="row g-3">

<form>
  <div class="row g-3">

    <div class="col-12">
	  <label for="search_term" class="form-label"><strong>Search</strong>
		<span class="ms-1" data-bs-toggle="tooltip"
				title="Enter a word or boolean search and select 'traditional' or enter a question and select 'natural language'."
				style="cursor: help;">
			<i class="bi bi-question-circle"></i>
		  </span>
		</label>
	  <div class="input-group">
		<input type="text" class="form-control" id="search_term" name="search_term">
		<span class="input-group-text">
		  <i class="bi bi-search"></i>
		</span>
	  </div>
	</div>

    <div class="col-12">
      <label class="form-label d-block"><strong>Search type</strong>
	  <span class="ms-1" data-bs-toggle="tooltip"
				title="Choose 'traditional' for a word or boolean search, 'natural language' for a question."
				style="cursor: help;">
			<i class="bi bi-question-circle"></i>
		  </span>
		  </label>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="search_type" id="traditional" value="traditional" checked>
        <label class="form-check-label" for="traditional">Traditional</label>
      </div>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="search_type" id="natural_language" value="natural_language">
        <label class="form-check-label" for="natural_language">Natural language</label>
      </div>
    </div>
	
	<div class="col-12">
	  <label class="form-label d-block"><strong>Date Range</strong>
		<span class="ms-1" data-bs-toggle="tooltip"
			  title="Return results only within a range. Hansards began at different times in different forms in different colonies. The earliest are 1824 in NSW."
			  style="cursor: help;">
		  <i class="bi bi-question-circle"></i>
		</span>
	  </label>
	</div>
	
		<div class="col-md-6">
	  <label for="date_from" class="form-label">Date From</label>
	  <input type="date" class="form-control" id="date_from" name="date_from"
			 value="1824-01-01"
			 min="1824-01-01"
			 max="1900-01-01">
	</div>

	<div class="col-md-6">
	  <label for="date_to" class="form-label">Date To</label>
	  <input type="date" class="form-control" id="date_to" name="date_to"
			 value="1900-01-01"
			 min="1824-01-01"
			 max="1900-01-01">
	</div>

    <div class="col-12">
      <label class="form-label d-block"><strong>Source Type</strong>
	  <span class="ms-1" data-bs-toggle="tooltip"
				title="Limit the search to any combination of official Hansards sources, or include the principle newspaper versions, or alternative newspaper versions."
				style="cursor: help;">
			<i class="bi bi-question-circle"></i>
		  </span>
		</label>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="checkbox" id="official" name="source_type[]" value="official">
        <label class="form-check-label" for="official">Official</label>
      </div>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="checkbox" id="principal_newspapers" name="source_type[]" value="principal_newspapers">
        <label class="form-check-label" for="principal_newspapers">Principal Newspapers</label>
      </div>
      <div class="form-check form-check-inline">
        <input class="form-check-input" type="checkbox" id="alternate_newspapers" name="source_type[]" value="alternate_newspapers">
        <label class="form-check-label" for="alternate_newspapers">Alternate Newspapers</label>
      </div>
    </div>

<div class="col-12">
  <label class="form-label d-block"><strong>House</strong>
    <span class="ms-1" data-bs-toggle="tooltip"
          title="Filter results by parliamentary house."
          style="cursor: help;">
      <i class="bi bi-question-circle"></i>
    </span>
  </label>
  <div class="form-check form-check-inline">
    <input class="form-check-input" type="checkbox" id="legislative_council" name="house[]" value="Legislative Council">
    <label class="form-check-label" for="legislative_council">Legislative Council</label>
  </div>
  <div class="form-check form-check-inline">
    <input class="form-check-input" type="checkbox" id="legislative_assembly" name="house[]" value="Legislative Assembly">
    <label class="form-check-label" for="legislative_assembly">Legislative Assembly</label>
  </div>
</div>



<div class="col-md-12">
  <label for="title_select" class="form-label"><strong>State / Title</strong></label>

  <select class="form-select" id="title_select">
    <option value="">Select a source...</option>

    <optgroup label="NSW">
      <option value="NSW Parliament Hansard">NSW Parliament Hansard (1856–1900)</option>
      <option value="NSW Trove Empire Legislative Council">NSW Trove Empire Legislative Council (1851–1880)</option>
      <option value="Sydney Morning Herald">Sydney Morning Herald (1843–1900)</option>
      <option value="The Australian">The Australian (1824–1848)</option>
      <option value="Sydney Gazette">Sydney Gazette (1824–1839)</option>
    </optgroup>

    <optgroup label="VIC">
      <option value="Parliament of Victoria Hansard">Parliament of Victoria Hansard (1856–1900)</option>
      <option value="Argus">Argus (1851–1900)</option>
      <option value="Age">Age (1854–1900)</option>
      <option value="Port Phillip Gazette">Port Phillip Gazette (1839–1851)</option>
    </optgroup>

    <optgroup label="SA">
      <option value="Parliament of South Australia Hansard">Parliament of South Australia Hansard (1857–1900)</option>
      <option value="South Australian Register">South Australian Register (1839–1900)</option>
      <option value="Adelaide Times">Adelaide Times (1848–1858)</option>
    </optgroup>

    <optgroup label="QLD">
      <option value="Queensland Parliament Hansard">Queensland Parliament Hansard (1864–1900)</option>
      <option value="Brisbane Courier">Brisbane Courier (1864–1900)</option>
    </optgroup>

    <optgroup label="WA">
      <option value="Parliament of Western Australia Hansard">Parliament of Western Australia Hansard (1871–1900)</option>
      <option value="Inquirer and Commercial News">Inquirer and Commercial News (1855–1900)</option>
      <option value="Perth Gazette and Western Australian Journal">Perth Gazette and Western Australian Journal (1833–1864)</option>
      <option value="The West Australian">The West Australian (1879–1900)</option>
    </optgroup>

    <optgroup label="TAS">
      <option value="Hobart Town Gazette">Hobart Town Gazette (1825–1860)</option>
      <option value="Colonial Times">Colonial Times (1828–1857)</option>
      <option value="The Mercury">The Mercury (1854–1900)</option>
    </optgroup>

    <optgroup label="Other">
      <option value="No official colonial source">No official colonial source (1979–1900)</option>
    </optgroup>
  </select>

  <div id="selected_titles" class="mt-2 d-flex flex-wrap gap-2"></div>
  <div id="selected_title_inputs"></div>
</div>



    <div class="col-12">
      <label for="filter_name" class="form-label"><strong>Filter by name</strong></label>
      <select class="form-select" id="filter_name" name="filter_name">
        <option value="">Select name</option>
        <option value="name_1">John Smith</option>
        <option value="name_2">Enry Iggins</option>
        <option value="name_3">Amos Quito</option>
        <option value="name_4">...</option>
      </select>
    </div>

  </div>
</form>


</div>
  </form>

</div>


</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
	  document.querySelectorAll('[data-bs-toggle="tooltip"]')
		.forEach(el => new bootstrap.Tooltip(el));
	</script>
	
	<script>
  const titleSelect = document.getElementById('title_select');
  const selectedTitles = document.getElementById('selected_titles');
  const selectedTitleInputs = document.getElementById('selected_title_inputs');

  function addTitle(value, label) {
    if (!value) return;

    if (selectedTitleInputs.querySelector('input[value="' + CSS.escape(value) + '"]')) {
      titleSelect.value = '';
      return;
    }

    const chip = document.createElement('span');
    chip.className = 'selected-chip';
    chip.setAttribute('data-value', value);
    chip.innerHTML = `
      <span>${label}</span>
      <button type="button" aria-label="Remove ${label}">&times;</button>
    `;

    chip.querySelector('button').addEventListener('click', function () {
      chip.remove();
      const hidden = selectedTitleInputs.querySelector('input[value="' + CSS.escape(value) + '"]');
      if (hidden) hidden.remove();
    });

    selectedTitles.appendChild(chip);

    const hiddenInput = document.createElement('input');
    hiddenInput.type = 'hidden';
    hiddenInput.name = 'titles[]';
    hiddenInput.value = value;
    selectedTitleInputs.appendChild(hiddenInput);

    titleSelect.value = '';
  }

  titleSelect.addEventListener('change', function () {
    const option = this.options[this.selectedIndex];
    addTitle(option.value, option.text);
  });
</script>

</body>
</html>
